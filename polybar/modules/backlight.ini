[module/backlight]
type = internal/backlight

card = amdgpu_bl0

use-actual-brightness = true

enable-scroll = true

format = <label>
format-padding = 1
format-prefix = %{T5}%{T-}
format-prefix-foreground = ${colors.blue}
label = %{T1}%percentage%%%{T-}
label-foreground = ${colors.fg}
label-padding = 1
